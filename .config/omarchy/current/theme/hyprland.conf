# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.


general {
    col.active_border = rgba(50556Ccc) #/ The default is rgba(f5eafdee)! The previous was rgba(3D1759ED)
    gaps_in = 4 #/ The default is 6! Previous was 2!
    gaps_out = 5 #/ The Default is 10! Previous was 8!
    border_size = 2 #/ The default is 3!
}
# Window Style
decoration {
    rounding = 7  #/ The default is 16!
    dim_inactive = true
    dim_strength = 0.2

    active_opacity = 0.87 #/ The default is 0.85! Previous was 0.87!
    inactive_opacity = 0.77 #/ The Default is 0.75! Previous was 0.77!

    shadow {
        enabled = true
        range = 1
        render_power = 1
    color = rgba(50556ccc) #/ The default is rgba(211, 211, 211, 0.8)! The previous was rgba(80, 85, 108, 0.8)
    }

    # ✅ Blur (new syntax)
    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }
    }
animations {
    enabled = true
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.5, 0, 0.99, 0.99
    bezier = smoothIn, 0.5, -0.5, 0.68, 1.5
    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 3, smoothOut
    animation = windowsIn, 1, 3, smoothOut
    animation = windowsMove, 1, 4, smoothIn, slide
    animation = border, 1, 5, default
    animation = fade, 1, 5, smoothIn
    animation = fadeDim, 1, 5, smoothIn
    animation = workspaces, 1, 6, default
}
